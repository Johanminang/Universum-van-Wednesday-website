<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code</title>
  <link rel="stylesheet" href="css/code_invoeren.css" />
</head>
<body>
    <div class="game-screen">

    <button class="back" onclick="history.back()">←</button>
    <button class="home" onclick="window.location.href='index.html'">⌂</button>

    <div class="code-box">

        <h1>
            Voer de code in om de<br>
            studenten te bevrijden
        </h1>

        <div class="code-letters">
            <input type="text" maxlength="1" class="code-input">
            <input type="text" maxlength="1" class="code-input">
            <input type="text" maxlength="1" class="code-input">
            <input type="text" maxlength="1" class="code-input">
        </div>
        
        <button class="next-btn">Verder</button>

    </div>

</div>

<div id="wrongPopup" class="popup hidden">

    <div class="popup-content">

        <h2>Je hebt het fout!</h2>

        <p class="wrong-text">
            De studenten zijn nog<br>
            steeds spoorloos
        </p>

        <button id="opnieuwBtn">
            Probeer opnieuw
        </button>

    </div>

</div>

<script src="js/code_invoeren.js"></script>
</body>
</html>
