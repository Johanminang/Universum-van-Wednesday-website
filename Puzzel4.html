<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzel 4</title>
  <link rel="stylesheet" href="puzzel4.css" />
</head>
<body>
    <div class="game-screen">

    <button class="back">←</button>
    <button class="home">⌂</button>

    <h1>Vul het juiste woord in</h1>

    <div class="puzzle-box">

        <div class="scrambled-word">
            TGSOH
        </div>

        <div class="letters">

            <div class="letter-box">
                <span>G</span>
                <div class="line"></div>
            </div>

            <div class="letter-box">
                <span>H</span>
                <div class="line"></div>
            </div>

            <div class="letter-box">
                <span>O</span>
                <div class="line"></div>
            </div>

            <div class="letter-box">
                <span>S</span>
                <div class="line"></div>
            </div>

            <div class="letter-box">
                <span>T</span>
                <div class="line"></div>
            </div>

        </div>

    </div>

</div>
</body>
</html>
