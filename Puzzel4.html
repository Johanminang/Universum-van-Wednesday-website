<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzel 4</title>
    <link rel="stylesheet" href="css/puzzel4.css">
</head>
<body>

    <div class="game-screen">

        <button class="back" onclick="history.back()">←</button>
        <button class="home" onclick="window.location.href='index.html'">⌂</button>

        <h1>Vul het juiste woord in</h1>

        <div class="puzzle-box">

            <div class="scrambled-word">
                TGSOH
            </div>

            <div class="letters">

                <div class="letter-box">
                    <input type="text" maxlength="1" class="answer">
                    <div class="line"></div>
                </div>

                <div class="letter-box">
                    <input type="text" maxlength="1" class="answer">
                    <div class="line"></div>
                </div>

                <div class="letter-box">
                    <input type="text" maxlength="1" class="answer">
                    <div class="line"></div>
                </div>

                <div class="letter-box">
                    <input type="text" maxlength="1" class="answer">
                    <div class="line"></div>
                </div>

                <div class="letter-box">
                    <input type="text" maxlength="1" class="answer">
                    <div class="line"></div>
                </div>

            </div>

        </div>

        <button class="check-btn">Controleer</button>

        <div id="popup" class="popup hidden">

            <div class="popup-content">

                <h2>Je hebt het goed!</h2>

                <p>Je letter is:</p>

                <div class="letter-code">K</div>

                <button id="verderBtn">Verder</button>

            </div>

        </div>

        <div id="wrongPopup" class="popup hidden">

            <div class="popup-content">

                <h2>Je hebt het fout!</h2>

                <p class="wrong-text">
                    De studenten zijn nog<br>
                    steeds spoorloos
                </p>

                <button id="opnieuwBtn">
                    Probeer opnieuw
                </button>

            </div>

        </div>

    </div>

    <script src="js/puzzel4.js"></script>

</body>
</html>
