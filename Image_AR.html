<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image AR</title>
  <link rel="stylesheet" href="css/image_AR.css" />
</head>

<body>
  <div class="game-screen">

    <button class="back" onclick="history.back()">←</button>
    <button class="home" onclick="window.location.href='index.html'">⌂</button>

    <h1>
      Scan deze afbeeldingen voor<br>
      verdere aanwijzingen
    </h1>

    <div class="scan-top">
    <img src="images/qrcode.png" alt="QR Code" class="qr-code">
  </div>

    <div class="scan-row">
      <div class="scan-box">
        <img src="images/Dagboek_1.png" alt="Dagboek 1">
      </div>

      <div class="scan-box">
        <img src="images/Dagboek_2.png" alt="Dagboek 2">
      </div>

      <div class="scan-box code-image">
        <img src="images/Dagboek_3.png" alt="Dagboek 3">
        <span class="hidden-code">3</span>
      </div>
    </div>

    <a href="puzzel3.html">
    <button class="next-btn">Verder</button>
  </a>

  </div>
</body>
</html>
