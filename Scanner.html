<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    a-scene {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: ./targets/dagboeken.mind;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-text value="Geen code gevonden" color="#E8E3F2" position="0 0.2 0" align="center" width="4"></a-text>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 1">
      <a-text value="Zoek verder..." color="#E8E3F2" position="0 0.2 0" align="center" width="4"></a-text>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 2">
      <a-text value="CODE = 3" color="#E8E3F2" position="0 0.2 0" align="center" width="4"></a-text>
    </a-entity>

  </a-scene>
</body>
</html>
