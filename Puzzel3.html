<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzel 3</title>
  <link rel="stylesheet" href="css/puzzel3.css" />
</head>
<body>
    <div class="game-screen">

    <button class="back" onclick="history.back()">←</button>
    <button class="home" onclick="window.location.href='index.html'">⌂</button>

    <h1>
        Kies een deur die je gaat leiden<br>
        naar de vermiste studenten
    </h1>

    <div class="doors">

        <button class="door">1</button>

        <button class="door">2</button>

        <button class="door door-3">3</button>

        <button class="door">4</button>

    </div>

</div>

<div id="popup" class="popup hidden">

    <div class="popup-content">

        <h2>Je hebt het goed!</h2>

        <p>Je letter is:</p>

        <div class="letter-code">R</div>

        <button id="verderBtn">Verder</button>

    </div>

</div>

<div id="wrongPopup" class="popup hidden">

    <div class="popup-content">

        <h2>Je hebt het fout!</h2>

        <p class="wrong-text">
            De studenten zijn nog<br>
            steeds spoorloos
        </p>

        <button id="opnieuwBtn">
            Probeer opnieuw
        </button>

    </div>

</div>

<script src="js/puzzel3.js"></script>
</body>
</html>
